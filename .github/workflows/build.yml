name: Build Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t openhab-cicd-lab:${{ steps.vars.outputs.tag }} \
            -t openhab-cicd-lab:latest .
      
      - name: Save docker image as artifact
        run: docker save openhab-cicd-lab:latest -o openhab-image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openhab-docker-image
          path: openhab-image.tar